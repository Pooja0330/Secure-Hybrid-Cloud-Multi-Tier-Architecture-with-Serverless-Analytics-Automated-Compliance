#Define Network ACL rules controlling subnet inbound/outbound traffic.
#Example: Allow HTTP/HTTPS, deny all traffic from suspicious IPs.
AWSTemplateFormatVersion: '2010-09-09'
Description: Network ACL rules

Resources:
  ExampleNetworkAcl:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: vpc-1234567890abcdef0  # Replace with your VPC ID

  InboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref ExampleNetworkAcl
      RuleNumber: 100
      Protocol: 6   # TCP
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80

  OutboundRule:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref ExampleNetworkAcl
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 80
        To: 80
